<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manager Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrap topbar__inner">
        <div>
          <div class="brand">Manager Portal</div>
          <div class="subtle">Sign in to add/edit/delete mess records.</div>
        </div>
        <a class="btn btn--ghost" href="{{ url_for('index') }}">Back to Dashboard</a>
      </div>
    </header>

    <main class="wrap">
      <section class="card loginCard">
        <div class="card__head">
          <h2 class="h2">Login</h2>
          <div class="subtle">Use the manager credentials seeded in the database.</div>
        </div>

        <form class="form" method="post" action="{{ url_for('login_post') }}">
          <input type="hidden" name="next" value="{{ next }}" />

          <label class="field">
            <span>Username</span>
            <input name="username" autocomplete="username" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>

          {% if error %}
          <div class="alert alert--bad" role="alert">{{ error }}</div>
          {% endif %}

          <button class="btn" type="submit">Sign In</button>
        </form>
      </section>
    </main>
  </body>
</html>
